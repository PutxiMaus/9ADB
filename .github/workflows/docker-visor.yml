name: Build Visor ADB

on:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile.visor
      - visor_app.py
      - .github/workflows/docker-visor.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/putximaus/9adb

jobs:
  build-visor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 visor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.visor
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:visor
            ${{ env.IMAGE_NAME }}:visor-arm64
          cache-from: type=gha,scope=9adb-visor-arm64
          cache-to: type=gha,mode=max,scope=9adb-visor-arm64
          provenance: false
